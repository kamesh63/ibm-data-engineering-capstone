name: 'client360x_dbt'
version: '1.0.0'
config-version: 2

profile: 'client360x_profile'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

models:
  client360x_dbt:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: ephemeral
      +schema: intermediate
    marts:
      +schema: marts
      core:
        +materialized: table
      finance:
        +materialized: table
      transactions:
        +materialized: incremental
        +incremental_strategy: merge
        +unique_key: txn_id

seeds:
  client360x_dbt:
    +schema: seeds
    +materialized: seed
    ref_region_mapping:
      +column_types:
        region_code: varchar(3)
        region_name: varchar(100)