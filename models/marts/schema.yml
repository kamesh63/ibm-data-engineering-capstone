version: 2

models:
  - name: dim_customer
    description: "Customer 360 analytical dimension. Combines cleaned profile details from Parquet raw with aggregated intermediate balances."
    columns:
      - name: cust_id
        tests:
          - unique
          - not_null

  - name: dim_branch
    description: "Branch dimension incorporating cleaned branch data joined with regional descriptions from the seed lookup."
    columns:
      - name: branch_id
        tests:
          - unique
          - not_null

  - name: dim_card
    description: "Unified credit and debit card directory, blending relational card tables with JSON-flattened card tables."
    columns:
      - name: card_id
        tests:
          - unique
          - not_null

  - name: fct_loans
    description: "Analytical facts about user loans ledger."
    columns:
      - name: loan_id
        tests:
          - unique
          - not_null
      - name: cust_id
        tests:
          - relationships:
              to: ref('dim_customer')
              field: cust_id

  - name: fct_transactions
    description: "Core high-volume transactional facts database materialized as a table. Uses custom transaction tier macros."
    columns:
      - name: txn_id
        tests:
          - unique
          - not_null
      - name: cust_id
        tests:
          - relationships:
              to: ref('dim_customer')
              field: cust_id
      - name: branch_id
        tests:
          - relationships:
              to: ref('dim_branch')
              field: branch_id

  - name: py_customer_segments
    description: "Python-based customer value scoring and segment classifications using Snowpark and Pandas."
    columns:
      - name: cust_id
        tests:
          - unique
          - not_null
      - name: customer_segment
        tests:
          - accepted_values:
              values:
                - 'High Net Worth (HNW) / VIP'
                - 'Premier / Mass Affluent'
                - 'Active Standard Retail'
                - 'Inactive / Zero Balance'