version: 2

models:
  - name: stg_branch
    description: "Cleaned branch records."
    columns:
      - name: branch_id
        description: "Primary key of the branch."
        tests:
          - unique
          - not_null
      - name: region_code
        description: "Abbreviated code for branch region."
        tests:
          - not_null

  - name: stg_card
    description: "Standardized active and historic card directory."
    columns:
      - name: card_id
        tests:
          - unique
          - not_null

  - name: stg_loan
    description: "Cleaned customer loan profiles."
    columns:
      - name: loan_id
        tests:
          - unique
          - not_null
      - name: status
        tests:
          - accepted_values:
              arguments:
                values: ['Active', 'Closed', 'Dormant', 'Defaulted']

  - name: stg_account
    description: "Cleaned bank account catalog."
    columns:
      - name: acct_id
        tests:
          - unique
          - not_null
      - name: acct_type
        tests:
          - accepted_values:
              arguments:
                values: ['Checking', 'Savings', 'Loan', 'Credit Line']

  - name: stg_transaction
    description: "Cleaned transaction logs."
    columns:
      - name: txn_id
        tests:
          - unique
          - not_null
      - name: txn_channel
        tests:
          - accepted_values:
              arguments:
                values: ['ATM', 'Online', 'Branch', 'Mobile']

  - name: stg_card_raw
    description: "Parsed semi-structured card JSON records."
    columns:
      - name: card_id
        tests:
          - unique
          - not_null

  - name: stg_customer_raw
    description: "Parsed semi-structured customer profiles from Parquet."
    columns:
      - name: cust_id
        tests:
          - unique
          - not_null